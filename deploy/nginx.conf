# Chennamane — production nginx for Vite SPA + large GLB/texture assets.
# Used by the runtime stage of Dockerfile (Dokploy maps host → container :80).

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Large models / HDR / textures
    client_max_body_size 64m;

    # Security / privacy headers (safe for a static game)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip text + common web formats (GLB is already compressed binary)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        image/svg+xml
        font/woff2;

    # Dokploy / load balancer health probe
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed Vite assets — immutable long cache
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 3D models, textures, HDR, audio — long cache, revalidate if needed
    location ~* ^/(models|textures|hdr|audio)/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        # Help browsers stream large binaries
        types {
            model/gltf-binary glb;
            model/gltf+json gltf;
            application/octet-stream bin;
        }
    }

    # PWA service worker / manifest must revalidate
    location ~* ^/(sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # SPA fallback — client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide nginx version
    server_tokens off;
}
