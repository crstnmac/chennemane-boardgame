<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- 9-slice friendly: thick edge, empty center — bronze viking frame -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0c070"/>
      <stop offset="45%" stop-color="#b08a45"/>
      <stop offset="100%" stop-color="#6a4e24"/>
    </linearGradient>
    <linearGradient id="i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a625c"/>
      <stop offset="100%" stop-color="#2a2622"/>
    </linearGradient>
  </defs>
  <!-- Outer iron rim -->
  <rect x="2" y="2" width="124" height="124" rx="10" fill="none" stroke="url(#i)" stroke-width="4"/>
  <!-- Bronze band -->
  <rect x="6" y="6" width="116" height="116" rx="8" fill="none" stroke="url(#g)" stroke-width="5"/>
  <!-- Inner hairline -->
  <rect x="12" y="12" width="104" height="104" rx="6" fill="none" stroke="#d4b06a" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Corner knots (TL) -->
  <path d="M14 28 V16 H28" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="square"/>
  <circle cx="14" cy="14" r="2.5" fill="#e0c070"/>
  <!-- TR -->
  <path d="M100 14 H114 V28" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="square"/>
  <circle cx="114" cy="14" r="2.5" fill="#e0c070"/>
  <!-- BL -->
  <path d="M14 100 V114 H28" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="square"/>
  <circle cx="14" cy="114" r="2.5" fill="#e0c070"/>
  <!-- BR -->
  <path d="M100 114 H114 V100" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="square"/>
  <circle cx="114" cy="114" r="2.5" fill="#e0c070"/>
</svg>
